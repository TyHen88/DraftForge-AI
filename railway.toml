# Railway config-as-code
# Docs: https://docs.railway.com/config-as-code/reference

[build]
# A `Dockerfile` exists in the repo, so Railway will use it by default.
builder = "DOCKERFILE"

[deploy]
# Combined process: FastAPI API (on $PORT) + the polling bot in one asyncio loop.
# The service is a "web" target — Railway routes HTTP to it and injects PORT.
startCommand = "python -m writer_ai_assistant web"
restartPolicyType = "ALWAYS"

